<!DOCTYPE html>
<html lang="bg">
<head>

    <title>Немски Език - Главно Меню</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --bg-color: #f0f2f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .menu-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 95%;
        }
        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .nav-btn {
            padding: 20px;
            border: 2px solid var(--primary);
            border-radius: 12px;
            background: white;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .nav-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(26, 42, 108, 0.2);
        }
        .icon {
            font-size: 1.6em;
        }
    </style>
</head>
